name: ANEProbe
options:
  bundleIdPrefix: com.klincov
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
targets:
  ANEProbe:
    type: application
    platform: iOS
    sources:
      - ANEProbe.swift
      - ANEDirectTest.m
      - ANEDirectTest.h
      - ANEWeightTest.m
      - ANEWeightTest.h
      - ANERE.m
      - ANERE.h
      - ANEReduceDebug.m
      - ANEReduceDebug.h
      - ANECompileLimitStress.m
      - ANECompileLimitStress.h
      - ANETrainingConfig.h
      - ANERMSNorm.m
      - ANERMSNorm.h
      - ANELinear.m
      - ANELinear.h
      - ANEAttention.m
      - ANEAttention.h
      - ANEFFN.m
      - ANEFFN.h
      - ANEBackward.m
      - ANEBackward.h
      - ANETrainStep.m
      - ANETrainStep.h
      - ANEThermal.m
      - ANEThermal.h
      - ANEDynamicTrain.m
      - ANEDynamicTrain.h
      - ANECheckpoint.m
      - ANECheckpoint.h
      - ANEDataPipeline.m
      - ANEDataPipeline.h
      - ANEStoriesMIL.h
      - ANEStoriesCPUOps.h
      - ANETrainingEngine.m
      - ANETrainingEngine.h
      - ANEBackgroundTraining.swift
      - ANEThermalMonitor.swift
      - TrainingDashboardView.swift
      - path: IdentityConv.mlmodelc
        type: folder
        buildPhase: resources
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klincov.aneprobe
        DEVELOPMENT_TEAM: SMPDFBGL64
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: ANEProbe-Bridging-Header.h
    dependencies:
      - sdk: Accelerate.framework
